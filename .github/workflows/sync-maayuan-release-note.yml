name: Sync MaaYuan Release Note

on:
  repository_dispatch:
    types:
      - maayuan_release_note_edited
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-maayuan-release-note
  cancel-in-progress: true

jobs:
  sync-release-note:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch recent releases from MaaYuan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/syoius/MaaYuan/releases?per_page=100" \
            > /tmp/maayuan-releases.json

      - name: Update nav popover data
        run: |
          node scripts/sync-maayuan-release-note.mjs \
            --release-json /tmp/maayuan-releases.json \
            --output .vitepress/shared/navPopover.mjs

      - name: Detect content changes
        id: changes
        run: |
          if git diff --quiet -- .vitepress/shared/navPopover.mjs; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated release note
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .vitepress/shared/navPopover.mjs
          git commit -m "docs(nav): 同步 MaaYuan 最新正式版 release note"
          git push
